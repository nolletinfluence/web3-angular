<div class="grid gap-2">
  <label for="address" class="text-sm text-slate-400">Адрес кошелька</label>
  <input
    id="address"
    type="text"
    placeholder="0x..."
    [formControl]="control"
    [disabled]="disabled"
    autocomplete="off"
    spellcheck="false"
    class="w-full rounded-xl border border-slate-800/80 bg-slate-950/70 px-3 py-3 text-sm text-slate-100 placeholder:text-slate-600 shadow-[0_10px_24px_rgba(15,23,42,0.35)] transition focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500/40 hover:border-slate-600/70 disabled:cursor-not-allowed disabled:opacity-60"
  />
  <span class="text-xs text-slate-400">
    EVM: 0x + 40 hex. Solana: base58, 32-44 символа.
  </span>
</div>
