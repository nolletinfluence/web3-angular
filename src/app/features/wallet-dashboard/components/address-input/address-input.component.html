<div class="grid gap-2">
  <label for="address" class="text-sm text-slate-400">Адрес кошелька</label>
  <input
    id="address"
    type="text"
    placeholder="0x..."
    [formControl]="control"
    [disabled]="disabled"
    autocomplete="off"
    spellcheck="false"
    class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-3 text-sm text-slate-100 focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500/40 disabled:cursor-not-allowed disabled:opacity-60"
  />
  <span class="text-xs text-slate-400">
    EVM: 0x + 40 hex. Solana: base58, 32-44 символа.
  </span>
</div>
